<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbitrage Calculator – Selene Calculators</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Arb grid layout ── */
    .arb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .arb-table {
      width: 100%;
      border-collapse: collapse;
    }

    .arb-table td, .arb-table th {
      padding: 0;
      border: none;
    }

    .arb-row {
      display: grid;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .arb-row:last-child { border-bottom: none; }

    .arb-row-label {
      padding: 18px 20px;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    .arb-cell {
      padding: 10px 14px;
      border-right: 1px solid var(--border);
    }

    .arb-cell:last-child { border-right: none; }

    .arb-cell input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .arb-cell input:focus { border-color: var(--accent); }

    .arb-cell input[readonly] {
      color: var(--text-muted);
      cursor: default;
      border-color: transparent;
      background: transparent;
    }

    /* money input with $ prefix */
    .money-wrap {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .money-wrap:focus-within { border-color: var(--accent); }

    .money-wrap.readonly {
      background: transparent;
      border-color: transparent;
    }

    .money-wrap .prefix {
      color: var(--text-muted);
      padding: 10px 0 10px 12px;
      font-size: 15px;
      user-select: none;
    }

    .money-wrap input {
      background: transparent;
      border: none !important;
      border-radius: 0 !important;
      padding: 10px 12px 10px 6px;
      font-size: 16px;
      font-weight: 500;
    }

    .money-wrap input:focus { border: none; }

    /* col headers */
    .arb-col-header {
      padding: 12px 14px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .arb-col-header:last-child { border-right: none; }

    /* Footer summary */
    .arb-footer {
      display: flex;
      align-items: stretch;
      border-top: 1px solid var(--border);
    }

    .arb-footer-item {
      flex: 1;
      padding: 16px 20px;
      border-right: 1px solid var(--border);
    }

    .arb-footer-item:last-child { border-right: none; }

    .arb-footer-item .f-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .arb-footer-item .f-value {
      font-size: 20px;
      font-weight: 700;
    }

    /* settings bar */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .settings-bar label { font-size: 13px; color: var(--text-muted); margin-right: 6px; }

    /* arb status banner */
    .arb-banner {
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .arb-banner.positive {
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      color: var(--accent-green);
    }

    .arb-banner.negative {
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.2);
      color: var(--text-muted);
    }

    .arb-banner .banner-icon { font-size: 18px; }

    /* remove col button */
    .col-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .col-remove:hover { color: var(--accent-red); background: rgba(248,81,73,0.1); }

    /* hide number spinners */
    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Selene<span>Calc</span></a>
  <nav>
    <a href="arbitrage.html" class="active">Arbitrage</a>
    <a href="prediction-markets.html">Prediction Markets</a>
    <a href="devigger.html">Devigger</a>
    <a href="ev-calculator.html">Expected Value</a>
  </nav>
</header>

<div class="page">
  <div class="page-header">
    <h1>Arbitrage Calculator</h1>
    <p>Enter odds and stakes for each outcome to detect guaranteed profit opportunities and calculate optimal wager amounts.</p>
  </div>

  <!-- Settings bar -->
  <div class="settings-bar">
    <div>
      <label>Odds Format</label>
      <div class="format-toggle" style="display:inline-flex;">
        <button class="format-btn active" onclick="setFormat('american', this)">American</button>
        <button class="format-btn" onclick="setFormat('decimal', this)">Decimal</button>
      </div>
    </div>
    <div>
      <label>Stakes</label>
      <div class="format-toggle" style="display:inline-flex;">
        <button class="format-btn active" id="modeManual" onclick="setStakeMode('manual')">Manual</button>
        <button class="format-btn" id="modeAuto" onclick="setStakeMode('auto')">Auto (Optimal)</button>
      </div>
    </div>
    <div id="bankrollWrap" style="display:none; align-items:center; gap:8px;">
      <label style="margin:0;">Bankroll $</label>
      <input type="number" id="bankroll" placeholder="1000" value="1000" min="1" style="width:110px;" oninput="calculate()">
    </div>
    <button class="btn btn-sm btn-outline" onclick="addOutcome()" style="margin-left:auto;">+ Add Outcome</button>
  </div>

  <!-- Arb status -->
  <div class="arb-banner negative" id="arbBanner">
    <span class="banner-icon">—</span>
    <span id="bannerText">Enter odds to check for arbitrage</span>
  </div>

  <!-- Main grid card -->
  <div class="arb-card" id="arbCard"></div>

  <!-- Info box -->
  <div class="info-box hidden" id="infoBox"></div>
</div>

<script>
let oddsFormat = 'american';
let stakeMode = 'manual'; // 'manual' | 'auto'
let outcomes = [
  { id: 1, name: 'Team A' },
  { id: 2, name: 'Team B' },
];
let nextId = 3;
let lastChangedStakeId = null;

/* ── Format helpers ── */
function toDecimal(val) {
  if (isNaN(val) || val === null) return null;
  if (oddsFormat === 'decimal') return val > 1 ? val : null;
  if (val >= 100) return (val / 100) + 1;
  if (val <= -100) return (100 / Math.abs(val)) + 1;
  return null;
}

function fmtMoney(n) { return n.toFixed(2); }

function fmtAmerican(dec) {
  if (dec >= 2) return '+' + Math.round((dec - 1) * 100);
  return String(Math.round(-100 / (dec - 1)));
}

/* ── Settings ── */
function setFormat(fmt, btn) {
  oddsFormat = fmt;
  document.querySelectorAll('.format-btn').forEach(b => {
    if (b.closest('.format-toggle') === btn.closest('.format-toggle')) b.classList.remove('active');
  });
  btn.classList.add('active');
  document.querySelectorAll('.odds-inp').forEach(inp => {
    if (!inp.value) inp.placeholder = fmt === 'american' ? '+110' : '2.10';
  });
  calculate();
}

function setStakeMode(mode) {
  stakeMode = mode;
  document.getElementById('modeManual').classList.toggle('active', mode === 'manual');
  document.getElementById('modeAuto').classList.toggle('active', mode === 'auto');
  document.getElementById('bankrollWrap').style.display = mode === 'auto' ? 'flex' : 'none';
  document.querySelectorAll('.stake-inp').forEach(inp => {
    inp.readOnly = mode === 'auto';
    inp.closest('.money-wrap').classList.toggle('readonly', mode === 'auto');
  });
  calculate();
}

function addOutcome() {
  outcomes.push({ id: nextId++, name: `Team ${String.fromCharCode(64 + outcomes.length + 1)}` });
  lastChangedStakeId = null;
  renderGrid();
  calculate();
}

function removeOutcome(id) {
  if (outcomes.length <= 2) return;
  outcomes = outcomes.filter(o => o.id !== id);
  if (lastChangedStakeId === id) lastChangedStakeId = null;
  renderGrid();
  calculate();
}

/* ── Render grid ── */
function renderGrid() {
  const card = document.getElementById('arbCard');
  const n = outcomes.length;

  // Column widths: 110px for label, 1fr per outcome
  const gridCols = `110px repeat(${n}, 1fr)`;

  const colHeaders = outcomes.map((o, i) => `
    <div class="arb-col-header" style="grid-column:${i + 2};">
      <input type="text" value="${o.name}"
        style="background:transparent;border:none;color:var(--text);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;width:calc(100% - ${outcomes.length > 2 ? '22px' : '0px'});outline:none;padding:0;"
        oninput="outcomes[${i}].name=this.value">
      ${outcomes.length > 2 ? `<button class="col-remove" onclick="removeOutcome(${o.id})" title="Remove">×</button>` : ''}
    </div>
  `).join('');

  const oddsInputs = outcomes.map((o, i) => `
    <div class="arb-cell" style="grid-column:${i + 2};">
      <input type="number" class="odds-inp"
        id="odds-${o.id}"
        placeholder="${oddsFormat === 'american' ? '+110' : '2.10'}"
        oninput="calculate()">
    </div>
  `).join('');

  const stakeInputs = outcomes.map((o, i) => `
    <div class="arb-cell" style="grid-column:${i + 2};">
      <div class="money-wrap ${stakeMode === 'auto' ? 'readonly' : ''}">
        <span class="prefix">$</span>
        <input type="number" class="stake-inp"
          id="stake-${o.id}"
          placeholder="100"
          value="100"
          ${stakeMode === 'auto' ? 'readonly' : ''}
          oninput="onStakeInput(${o.id})">
      </div>
    </div>
  `).join('');

  const payoutCells = outcomes.map((o, i) => `
    <div class="arb-cell" style="grid-column:${i + 2};">
      <div class="money-wrap readonly">
        <span class="prefix">$</span>
        <input type="number" class="payout-out" id="payout-${o.id}" readonly placeholder="0.00">
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <!-- Col headers row -->
    <div class="arb-row" style="display:grid;grid-template-columns:${gridCols};">
      <div class="arb-col-header" style="background:var(--surface);border-bottom:1px solid var(--border);"></div>
      ${colHeaders}
    </div>

    <!-- Odds row -->
    <div class="arb-row" style="display:grid;grid-template-columns:${gridCols};">
      <div class="arb-row-label">Odds</div>
      ${oddsInputs}
    </div>

    <!-- Stake row -->
    <div class="arb-row" style="display:grid;grid-template-columns:${gridCols};">
      <div class="arb-row-label">Stake</div>
      ${stakeInputs}
    </div>

    <!-- Payout row -->
    <div class="arb-row" style="display:grid;grid-template-columns:${gridCols};">
      <div class="arb-row-label">Payout</div>
      ${payoutCells}
    </div>

    <!-- Footer -->
    <div class="arb-footer" id="arbFooter">
      <div class="arb-footer-item">
        <div class="f-label">Total Stake</div>
        <div class="f-value" id="footTotalStake">$0.00</div>
      </div>
      <div class="arb-footer-item">
        <div class="f-label">Total Payout</div>
        <div class="f-value" id="footTotalPayout">$0.00</div>
      </div>
      <div class="arb-footer-item">
        <div class="f-label" id="footProfitLabel">Profit (0.00%)</div>
        <div class="f-value" id="footProfit">$0.00</div>
      </div>
    </div>
  `;
}

function onStakeInput(id) {
  lastChangedStakeId = id;
  calculate();
}

/* ── Calculate ── */
function calculate() {
  const n = outcomes.length;
  const decimals = outcomes.map(o => toDecimal(parseFloat(document.getElementById(`odds-${o.id}`)?.value)));
  const allOddsValid = decimals.every(d => d !== null);

  if (!allOddsValid) {
    setBanner(null);
    clearPayouts();
    return;
  }

  const impliedProbs = decimals.map(d => 1 / d);
  const totalImplied = impliedProbs.reduce((a, b) => a + b, 0);
  const isArb = totalImplied < 1;

  let stakes;
  if (stakeMode === 'auto') {
    const bankroll = parseFloat(document.getElementById('bankroll').value) || 1000;
    stakes = impliedProbs.map(p => bankroll * p / totalImplied);
    outcomes.forEach((o, i) => {
      const inp = document.getElementById(`stake-${o.id}`);
      if (inp) inp.value = stakes[i].toFixed(2);
    });
  } else {
    // If a specific stake was changed, backfill the others to equalize payouts
    const anchorIdx = lastChangedStakeId !== null
      ? outcomes.findIndex(o => o.id === lastChangedStakeId)
      : -1;

    if (anchorIdx !== -1) {
      const anchorStake = parseFloat(document.getElementById(`stake-${outcomes[anchorIdx].id}`)?.value) || 0;
      const targetPayout = anchorStake * decimals[anchorIdx];
      stakes = outcomes.map((o, i) => {
        if (i === anchorIdx) return anchorStake;
        const computed = targetPayout / decimals[i];
        const inp = document.getElementById(`stake-${o.id}`);
        if (inp) inp.value = computed.toFixed(2);
        return computed;
      });
    } else {
      stakes = outcomes.map(o => parseFloat(document.getElementById(`stake-${o.id}`)?.value) || 0);
    }
  }

  const payouts = outcomes.map((o, i) => stakes[i] * decimals[i]);
  const totalStake = stakes.reduce((a, b) => a + b, 0);
  const guaranteedPayout = Math.min(...payouts);
  const profit = guaranteedPayout - totalStake;
  const roiPct = totalStake > 0 ? (profit / totalStake) * 100 : 0;

  // Fill payout cells
  outcomes.forEach((o, i) => {
    const el = document.getElementById(`payout-${o.id}`);
    if (el) el.value = fmtMoney(payouts[i]);
  });

  // Footer
  document.getElementById('footTotalStake').textContent = `$${fmtMoney(totalStake)}`;
  document.getElementById('footTotalPayout').textContent = `$${fmtMoney(guaranteedPayout)}`;
  document.getElementById('footProfitLabel').textContent = `${isArb ? 'Profit' : 'Loss'} (${roiPct.toFixed(2)}%)`;

  const profitEl = document.getElementById('footProfit');
  profitEl.textContent = `${profit >= 0 ? '+' : ''}$${fmtMoney(profit)}`;
  profitEl.style.color = isArb ? 'var(--accent-green)' : 'var(--accent-red)';

  // Banner
  setBanner(isArb, profit, roiPct, totalImplied);

  // Info box
  const infoBox = document.getElementById('infoBox');
  if (isArb) {
    infoBox.classList.remove('hidden');
    const stakeList = outcomes.map((o, i) => `<strong>$${fmtMoney(stakes[i])}</strong> on ${o.name || `Outcome ${i+1}`}`).join(', ');
    infoBox.innerHTML = `<strong>How to execute:</strong> Bet ${stakeList}. Regardless of which outcome wins, your guaranteed return is <strong>$${fmtMoney(guaranteedPayout)}</strong> for a profit of <strong>+$${fmtMoney(profit)}</strong> (${roiPct.toFixed(2)}% ROI).`;
  } else {
    infoBox.classList.add('hidden');
  }
}

function clearPayouts() {
  outcomes.forEach(o => {
    const el = document.getElementById(`payout-${o.id}`);
    if (el) el.value = '';
  });
  document.getElementById('footTotalStake').textContent = '$0.00';
  document.getElementById('footTotalPayout').textContent = '$0.00';
  document.getElementById('footProfitLabel').textContent = 'Profit (0.00%)';
  document.getElementById('footProfit').textContent = '$0.00';
  document.getElementById('footProfit').style.color = '';
}

function setBanner(isArb, profit, roiPct, totalImplied) {
  const banner = document.getElementById('arbBanner');
  const text = document.getElementById('bannerText');
  const icon = banner.querySelector('.banner-icon');

  if (isArb === null) {
    banner.className = 'arb-banner negative';
    icon.textContent = '—';
    text.textContent = 'Enter odds to check for arbitrage';
    return;
  }

  if (isArb) {
    banner.className = 'arb-banner positive';
    icon.textContent = '✓';
    text.innerHTML = `Arbitrage opportunity found &mdash; guaranteed profit of <strong>+$${fmtMoney(profit)}</strong> (${roiPct.toFixed(2)}% ROI). Combined implied probability: ${(totalImplied * 100).toFixed(2)}%.`;
  } else {
    banner.className = 'arb-banner negative';
    icon.textContent = '✗';
    text.innerHTML = `No arbitrage &mdash; books hold a <strong>${((totalImplied - 1) * 100).toFixed(2)}%</strong> margin. Combined implied probability: ${(totalImplied * 100).toFixed(2)}%.`;
  }
}

/* ── Init ── */
renderGrid();
</script>
</body>
</html>
